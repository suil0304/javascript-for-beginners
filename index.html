<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Momentum Clone Coding</title>
        <link rel="stylesheet" href="./css/style.css">
    </head>
    <body>
        <form class="hidden" id="login-form" action="">
            <input required maxlength="" type="text" placeholder="What in your name?" name="username">
            <button type="submit">Log In</button>
        </form>
        <h2 id="clock">00:00:00</h2>
        <h1 class="hidden" id="greeting"></h1>
        <form id="todo-form">
            <input type="text" placeholder="Write a To Do and Press Enter" required>
        </form>
        <ul id="todo-list"></ul>
        <div id="quote-block">
            <span id="quote-content"></span>
            <span id="quote-author"></span>
            <span class="hidden" id="quote-from"></span>
        </div>
        <div id="weather">
            <span id="weather-text"></span>
            <span id="city-text"></span>
        </div>
        <script type="module" src="./js/const.js"></script>
        <script type="module" src="./js/greeting.js"></script>
        <script type="module" src="./js/clock.js"></script>
        <script type="module" src="./js/quotes.js"></script>
        <script type="module" src="./js/background.js"></script>
        <script type="module" src="./js/todo.js"></script>
        <script type="module" src="./js/weather.js"></script>
    </body>
</html>
